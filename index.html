<!DOCTYPE html>
<html>
<head>
    <script>
        /* 1. Define the source */
        const src = "https://fastly.jsdelivr.net/npm/galactic-lite/";

        /* 2. Fetch and Inject */
        fetch(src + "index.html")
            .then(res => res.text())
            .then(html => {
                // The <base> tag ensures all relative links (games.json, etc.) 
                // point to the CDN, not the current domain.
                const patchedHtml = html.replace("<head>", `<head><base href="${src}">`);
                
                document.open();
                document.write(patchedHtml);
                document.close();
            });
    </script>
</head>
<body style="background:#000;"></body>
</html>
